solax:
  email: "you@example.com"
  password: "yourpassword"
  site_id: "12345678"
  # AES-CBC keys: set via SOLAX_CRYPTO_KEY and SOLAX_CRYPTO_IV env vars

octopus:
  api_key: "sk_live_..."
  # account_id: "A-XXXXXXXX"  # or set OCTOPUS_ACCOUNT_ID env var
  # Used to fetch tariff agreement history for accurate actual-cost calculation.
  mpan_import: "1234567890123"
  mpan_export: "1234567890124"
  meter_serial_import: "..."
  meter_serial_export: "..."
  region: "P"             # DNO region code — derive from MPAN 2nd digit
  go_rates:
    - from: "2025-04-01"
      peak_rate: 28.224    # p/kWh
      offpeak_rate: 8.50  # p/kWh
      offpeak_start: "00:30"
      offpeak_end: "05:30"
      standing_charge: 51.809  # p/day
    - from: "2026-01-01"
      peak_rate: 29.616    # p/kWh
      offpeak_rate: 8.50  # p/kWh
      offpeak_start: "00:30"
      offpeak_end: "05:30"
      standing_charge: 52.494  # p/day
    - from: "2026-04-01"
      peak_rate: 27.157    # p/kWh
      offpeak_rate: 6.50  # p/kWh
      offpeak_start: "00:30"
      offpeak_end: "05:30"
      standing_charge: 52.494  # p/day
  export_rates:
    - from: "2025-04-01"
      rate: 15.0          # p/kWh
    - from: "2026-03-01"
      rate: 12.0

s3:
  endpoint: "https://<account-id>.r2.cloudflarestorage.com"
  bucket: "solar-data"
  region: "auto"
  # Credentials are read from the standard AWS credential chain:
  # AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY env vars, or ~/.aws/credentials

# Local cache directory for S3 data (default: .cache, override with CACHE_DIR env var).
# Set to empty string to disable caching.
cache_dir: ".cache"
